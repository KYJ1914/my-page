<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김예준 | 자기소개</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #000000;
            --border-color: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        header {
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .divider {
            width: 30px;
            height: 2px;
            background-color: var(--accent-color);
            margin: 2rem auto;
        }

        .intro-box {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 0;
            border: 1px solid var(--accent-color);
            box-shadow: 10px 10px 0px 0px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .intro-box:hover {
            transform: translate(-2px, -2px);
            box-shadow: 15px 15px 0px 0px rgba(0,0,0,0.08);
        }

        .intro-text {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-primary);
            word-break: keep-all;
        }

        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: #bbb;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .intro-box { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>김예준</h1>
            <p class="subtitle">상명대학교 전기공학전공 · 25학번</p>
        </header>

        <div class="divider"></div>

        <section class="intro-box">
            <p class="intro-text">
                안녕하십니까. <br>
                상명대 전기공학전공 25학번 김예준입니다. <br>
                잘 부탁드립니다.
            </p>
        </section>

        <footer>
            <p>EST. 2026 / KIM YEJUN</p>
        </footer>
    </div>
</body>
</html>
