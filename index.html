<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김예준 | 자기소개</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #000000;
            --border-color: #eeeeee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        header {
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--accent-color);
            margin: 2rem auto;
        }

        .intro-box {
            background: #fafafa;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease;
        }

        .intro-box:hover {
            transform: translateY(-5px);
        }

        .intro-text {
            font-size: 1.25rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #999;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .intro-box { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>김예준</h1>
            <p class="subtitle">상명대학교 전기공학전공 · 2학년</p>
        </header>

        <div class="divider"></div>

        <section class="intro-box">
            <p class="intro-text">"멋있는 사람임"</p>
        </section>

        <footer>
            <p>&copy; 2026 Kim Yejun. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
